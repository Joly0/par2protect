[display]
place=Tasks:95

[paths]
par2_storage=/mnt/user/appdata/par2protect/parity
log_path=/mnt/user/appdata/par2protect/logs
status_path=/mnt/user/appdata/par2protect/status

[protection]
default_redundancy=5
verify_schedule=weekly
verify_time=03:00
protected_paths=

[resource_limits]
max_cpu_usage=50
max_concurrent_operations=2
max_memory_usage=80
max_io_usage=70
io_priority=low

[database]
max_connections=5
min_connections=1
max_idle_time=30
health_check_interval=60

[resource_monitoring]
cpu_sample_interval=5
memory_sample_interval=10
io_sample_interval=15
max_history_entries=60
adaptive_limits=true

[monitoring]
enabled=true
check_interval=300

[notifications]
level=warnings

[debug]
debug_logging=false