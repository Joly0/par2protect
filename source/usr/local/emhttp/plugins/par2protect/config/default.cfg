[paths]
par2_storage=/mnt/user/appdata/par2protect/parity
log_path=/mnt/user/appdata/par2protect/logs
status_path=/mnt/user/appdata/par2protect/status

[protection]
default_redundancy=5
verify_schedule=weekly
verify_time=03:00
protected_paths=

[resource_limits]
max_cpu_usage=50
max_concurrent_operations=2
io_priority=low

[monitoring]
enabled=true
check_interval=300

[notifications]
level=warnings